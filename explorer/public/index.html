<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTL Coin Explorer</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <a href="/" class="logo">TTL<span>coin</span> Explorer</a>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by block, tx hash, or address...">
      <button onclick="doSearch()">Search</button>
    </div>
    <nav class="nav">
      <a href="/" class="active" data-nav="home">Dashboard</a>
      <a href="/blocks" data-nav="blocks">Blocks</a>
    </nav>
  </header>
  <main class="container" id="app">
    <div class="loading"><div class="spinner"></div></div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
